name: CI

on:
  push:
    branches: [main, master, "phase/**"]
  pull_request:
    branches: [main, master]

# v7.0 Phase 1 雛形：lint + secret scan
# 後續 Phase 升級：
#   P3 後加 pytest（含 testcontainers）
#   P15 後加 frontend lint / build / test
#   P19 後加 Trivy / npm audit

jobs:
  lint-backend:
    name: Backend Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.7.3"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Run ruff check
        working-directory: backend
        run: uv run ruff check app/ tests/
      - name: Run ruff format check
        working-directory: backend
        run: uv run ruff format --check app/ tests/

  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # detect-secrets 需要 git history
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.7.3"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies (includes detect-secrets)
        working-directory: backend
        run: uv sync --frozen
      - name: Run detect-secrets
        working-directory: backend
        run: uv run detect-secrets scan --baseline ../.secrets.baseline

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.7.3"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync dependencies
        working-directory: backend
        run: uv sync --frozen
      - name: Run pre-commit
        run: |
          cd backend
          uv run pre-commit run --all-files --config ../.pre-commit-config.yaml
